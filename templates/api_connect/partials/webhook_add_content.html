{% load djicons i18n %}
<div data-back-url="{% url 'api_connect:webhooks_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Webhook" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'api_connect:webhooks_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-webhook-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-webhook-form"
          hx-post="{% url 'api_connect:webhook_add' %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Url" %}</label>
                <input type="url" name="url" class="input input-sm w-full" placeholder="https://">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Events" %}</label>
                <textarea name="events" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Secret" %}</label>
                <input type="text" name="secret" class="input input-sm w-full" placeholder="{% trans 'Secret' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Last Triggered At" %}</label>
                <input type="datetime-local" name="last_triggered_at" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Failure Count" %}</label>
                <input type="number" name="failure_count" class="input input-sm w-full"  placeholder="0">
                </div>
            </div>
        </div>
    </form>
</div>
